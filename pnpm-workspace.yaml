packages:
  - packages/*

# Make sure to update the corresponding README.md in each package when updating the catalog
catalog:
  eslint: ^9.36
  prettier: ^3.6
  typescript: ^5.8

ignoredBuiltDependencies:
  - "@tailwindcss/oxide"
  - esbuild
  - unrs-resolver

linkWorkspacePackages: true

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - "@ktam/*"
  # Renovate security update: pnpm@10.28.2
  - pnpm@10.28.2

publicHoistPattern:
  - "@typescript-eslint/parser"
  - eslint-plugin-jsx-a11y

publishBranch: main

savePrefix: ""

saveWorkspaceProtocol: rolling
